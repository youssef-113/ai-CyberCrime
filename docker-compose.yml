version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend

  db:
    image: postgres:14
    environment:
      POSTGRES_USER: cyberuser
      POSTGRES_PASSWORD: cyberpass
      POSTGRES_DB: cybercrime
    ports:
      - "5432:5432"
